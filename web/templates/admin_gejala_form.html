{{ define "content" }}
<div class="page-header"><h3><i class="bi bi-heart-pulse"></i> {{ .Data.FormTitle }}</h3><a href="/admin/gejala" class="btn btn-secondary"><i class="bi bi-arrow-left text-white"></i> Kembali</a></div>
<div class="card"><div class="card-body"><form method="POST" action="{{ .Data.Action }}"><input type="hidden" name="_method" value="{{ .Data.Method }}"><div class="mb-3"><label for="kode_gejala" class="form-label fw-bold">Kode Gejala</label><input type="text" class="form-control {{ if index .Errors "kode_gejala" }}is-invalid{{ end }}" id="kode_gejala" name="kode_gejala" value="{{ index .Form "kode_gejala" }}" required maxlength="3"><div class="invalid-feedback">{{ index .Errors "kode_gejala" }}</div></div><div class="mb-3"><label for="nama_gejala" class="form-label fw-bold">Nama Gejala</label><input type="text" class="form-control {{ if index .Errors "nama_gejala" }}is-invalid{{ end }}" id="nama_gejala" name="nama_gejala" value="{{ index .Form "nama_gejala" }}" required maxlength="100"><div class="invalid-feedback">{{ index .Errors "nama_gejala" }}</div></div><button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Simpan</button></form></div></div>
{{ end }}
