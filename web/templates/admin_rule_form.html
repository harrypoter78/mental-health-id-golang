{{ define "content" }}
<div class="page-header"><h3><i class="bi bi-diagram-3"></i> {{ .Data.FormTitle }}</h3><a href="/admin/rule" class="btn btn-secondary"><i class="bi bi-arrow-left text-white"></i> Kembali</a></div>
<div class="card"><div class="card-body"><form method="POST" action="{{ .Data.Action }}"><input type="hidden" name="_method" value="{{ .Data.Method }}"><div class="mb-3"><label for="kode_rule" class="form-label fw-bold">Kode Rule</label><input type="number" class="form-control {{ if index .Errors "kode_rule" }}is-invalid{{ end }}" id="kode_rule" name="kode_rule" value="{{ index .Form "kode_rule" }}" required><div class="invalid-feedback">{{ index .Errors "kode_rule" }}</div></div><div class="mb-3"><label for="kode_penyakit" class="form-label fw-bold">Penyakit</label><select class="form-select {{ if index .Errors "kode_penyakit" }}is-invalid{{ end }}" id="kode_penyakit" name="kode_penyakit" required><option value="">Pilih Penyakit</option>{{ range .Data.Penyakit }}<option value="{{ .KodePenyakit }}" {{ if eq .KodePenyakit (index $.Form "kode_penyakit") }}selected{{ end }}>{{ .NamaPenyakit }} ({{ .KodePenyakit }})</option>{{ end }}</select><div class="invalid-feedback">{{ index .Errors "kode_penyakit" }}</div></div><div class="mb-3"><label for="kode_gejala" class="form-label fw-bold">Gejala</label><select class="form-select {{ if index .Errors "kode_gejala" }}is-invalid{{ end }}" id="kode_gejala" name="kode_gejala" required><option value="">Pilih Gejala</option>{{ range .Data.Gejala }}<option value="{{ .KodeGejala }}" {{ if eq .KodeGejala (index $.Form "kode_gejala") }}selected{{ end }}>{{ .NamaGejala }} ({{ .KodeGejala }})</option>{{ end }}</select><div class="invalid-feedback">{{ index .Errors "kode_gejala" }}</div></div><button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Simpan</button></form></div></div>
{{ end }}
