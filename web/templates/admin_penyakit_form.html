{{ define "content" }}
<div class="page-header"><h3><i class="bi bi-virus2"></i> {{ .Data.FormTitle }}</h3><a href="/admin/penyakit" class="btn btn-secondary"><i class="bi bi-arrow-left text-white"></i> Kembali</a></div>
<div class="card"><div class="card-body"><form method="POST" action="{{ .Data.Action }}"><input type="hidden" name="_method" value="{{ .Data.Method }}"><div class="mb-3"><label for="kode_penyakit" class="form-label fw-bold">Kode Penyakit</label><input type="text" class="form-control {{ if index .Errors "kode_penyakit" }}is-invalid{{ end }}" id="kode_penyakit" name="kode_penyakit" value="{{ index .Form "kode_penyakit" }}" required maxlength="3"><div class="invalid-feedback">{{ index .Errors "kode_penyakit" }}</div></div><div class="mb-3"><label for="nama_penyakit" class="form-label fw-bold">Nama Penyakit</label><input type="text" class="form-control {{ if index .Errors "nama_penyakit" }}is-invalid{{ end }}" id="nama_penyakit" name="nama_penyakit" value="{{ index .Form "nama_penyakit" }}" required maxlength="50"><div class="invalid-feedback">{{ index .Errors "nama_penyakit" }}</div></div><div class="mb-3"><label for="deskripsi" class="form-label fw-bold">Deskripsi</label><textarea class="form-control" id="deskripsi" name="deskripsi" rows="3">{{ index .Form "deskripsi" }}</textarea></div><div class="mb-3"><label for="solusi_obat" class="form-label fw-bold">Solusi Obat</label><textarea class="form-control" id="solusi_obat" name="solusi_obat" rows="3">{{ index .Form "solusi_obat" }}</textarea></div><div class="mb-3"><label for="solusi_lain" class="form-label fw-bold">Solusi Lain</label><textarea class="form-control" id="solusi_lain" name="solusi_lain" rows="3">{{ index .Form "solusi_lain" }}</textarea></div><button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Simpan</button></form></div></div>
{{ end }}
