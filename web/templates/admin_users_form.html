{{ define "content" }}
<div class="page-header"><h3><i class="bi bi-people"></i> {{ .Data.FormTitle }}</h3><a href="/admin/users" class="btn btn-secondary"><i class="bi bi-arrow-left text-white"></i> Kembali</a></div>
<div class="card"><div class="card-body"><form method="POST" action="{{ .Data.Action }}"><input type="hidden" name="_method" value="{{ .Data.Method }}"><div class="mb-3"><label for="name" class="form-label fw-bold">Nama Lengkap</label><input type="text" class="form-control {{ if index .Errors "name" }}is-invalid{{ end }}" id="name" name="name" value="{{ index .Form "name" }}" required><div class="invalid-feedback">{{ index .Errors "name" }}</div></div><div class="mb-3"><label for="email" class="form-label fw-bold">Email</label><input type="email" class="form-control {{ if index .Errors "email" }}is-invalid{{ end }}" id="email" name="email" value="{{ index .Form "email" }}" required><div class="invalid-feedback">{{ index .Errors "email" }}</div></div><div class="mb-3"><label for="password" class="form-label fw-bold">Password {{ if eq .Data.Method "PUT" }}(kosongkan jika tidak ingin mengubah){{ end }}</label><input type="password" class="form-control {{ if index .Errors "password" }}is-invalid{{ end }}" id="password" name="password" {{ if eq .Data.Method "POST" }}required{{ end }}><div class="invalid-feedback">{{ index .Errors "password" }}</div></div><div class="mb-3"><label for="password_confirmation" class="form-label fw-bold">Konfirmasi Password</label><input type="password" class="form-control {{ if index .Errors "password_confirmation" }}is-invalid{{ end }}" id="password_confirmation" name="password_confirmation" {{ if eq .Data.Method "POST" }}required{{ end }}><div class="invalid-feedback">{{ index .Errors "password_confirmation" }}</div></div><div class="mb-3"><label for="role" class="form-label fw-bold">Role</label><select class="form-select {{ if index .Errors "role" }}is-invalid{{ end }}" id="role" name="role" required><option value="user" {{ if eq (index .Form "role") "user" }}selected{{ end }}>User</option><option value="admin" {{ if eq (index .Form "role") "admin" }}selected{{ end }}>Admin</option></select><div class="invalid-feedback">{{ index .Errors "role" }}</div></div><button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Simpan</button></form></div></div>
{{ end }}
